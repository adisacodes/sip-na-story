<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sip na Story</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">Sip na Story</a>
            <div class="d-flex">
                <a href="/" class="btn btn-nav me-2 active">Home</a>
                <a href="/menu" class="btn btn-nav">Menu</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero-wrapper">
        <div class="hero-card">
            <img src="{{ url_for('static', filename='images/hero.avif') }}" alt="Cocktails on a table" class="hero-banner">
            <p class="hero-kicker">Karibu</p>
            <h1 class="hero-title">Welcome!</h1>
            <p class="hero-tagline">Good drinks, good company, good stories.</p>
            <a href="/menu" class="btn btn-hero mt-3">See the Menu</a>
        </div>
    </div>

    <!-- About strip -->
    <div class="container about-section text-center">
        <p class="about-kicker">Our Story</p>
        <p class="about-text">
            Sip na Story is a little corner for classic cocktails, easy conversation,
            and slow evenings. Every drink on our menu is a favorite for a reason —
            pull up a seat and find yours.
        </p>
    </div>

</body>
</html>
